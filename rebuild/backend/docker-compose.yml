version: '3.8'

services:
  nayamo-backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/nayamo
    volumes:
      - ./logs:/app/logs
    depends_on:
      - mongo
    networks:
      - nayamo-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    environment:
      MONGO_INITDB_DATABASE: nayamo
    networks:
      - nayamo-network

volumes:
  mongo-data:

networks:
  nayamo-network:
    driver: bridge

